name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [1.21.11, 1.21.10]
        include:
          - version: 1.21.11
            target: ""
          - version: 1.21.10
            target: "-PtargetVersion=1.21.10"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build for ${{ matrix.version }}
        run: ./gradlew build --no-daemon ${{ matrix.target }}

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.version }}
          path: |
            build/reports/tests/
            build/test-results/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.version }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: jar-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PxIgnis-*.jar
          generate_release_notes: true

      - name: Publish 1.21.11 to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          modrinth-id: SYYlZZEi
          modrinth-token: ${{ secrets.MODRINTH }}
          files: dist/PxIgnis-*1.21.11*.jar
          game-versions: 1.21.11
          loaders: fabric
          version-type: release
          modrinth-unfeature-mode: subset
          dependencies: |
            fabric-api
            fabric-language-kotlin

      - name: Publish 1.21.10 to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          modrinth-id: SYYlZZEi
          modrinth-token: ${{ secrets.MODRINTH }}
          files: dist/PxIgnis-*1.21.10*.jar
          game-versions: 1.21.10
          loaders: fabric
          version-type: release
          modrinth-unfeature-mode: subset
          dependencies: |
            fabric-api
            fabric-language-kotlin
